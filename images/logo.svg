<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" role="img" aria-label="Pleasant Lake Storage logo">
  <!-- Sky semicircle -->
  <clipPath id="sky"><path d="M60 130 A120 120 0 0 1 300 130 Z"/></clipPath>
  <g clip-path="url(#sky)">
    <rect x="60" y="10" width="240" height="120" fill="#aed6f5"/>
    <!-- Sun -->
    <circle cx="135" cy="85" r="32" fill="#fcbd59"/>
    <!-- Cloud / water mass (mid blue) -->
    <path d="M95 130 a38 38 0 0 1 64 -22 a46 46 0 0 1 60 -38 a52 52 0 0 1 88 30 v30 Z" fill="#1f72bd"/>
    <path d="M178 130 a40 40 0 0 1 70 -20 a36 36 0 0 1 52 16 v4 Z" fill="#5da3dd" opacity="0.55"/>
  </g>
  <!-- Dock -->
  <g fill="#0d2c5b">
    <rect x="245" y="124" width="62" height="7" rx="2"/>
    <rect x="252" y="131" width="5" height="14"/>
    <rect x="292" y="131" width="5" height="14"/>
    <!-- Fisherman silhouette: seated in chair -->
    <circle cx="276" cy="98" r="5.5"/>
    <path d="M270 104 q8 -2 11 4 l3 9 q1 4 -3 5 l-9 2 q-5 1 -6 -4 l-1 -10 q0 -5 5 -6 Z"/>
    <!-- legs -->
    <path d="M268 120 l-8 7 -1 -3 7 -7 Z"/>
    <path d="M272 121 l-4 8 -3 -1 4 -9 Z"/>
    <!-- chair -->
    <path d="M280 105 l4 19 -3 0.6 -4 -19 Z"/>
    <path d="M266 124 l18 0 0 3 -18 0 Z" opacity="0.9"/>
    <!-- rod -->
    <path d="M273 106 L208 88 l0.6 -2 65 17 Z"/>
    <!-- line -->
    <path d="M209 87 q-2 18 4 36" stroke="#0d2c5b" stroke-width="1.2" fill="none"/>
  </g>
  <!-- Water reflection lines -->
  <g fill="#0d2c5b">
    <rect x="92" y="148" width="176" height="3" rx="1.5"/>
    <rect x="120" y="156" width="120" height="2.6" rx="1.3"/>
    <rect x="142" y="163" width="76" height="2.2" rx="1.1"/>
  </g>
  <!-- Wordmark -->
  <text x="180" y="196" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="30" letter-spacing="4" fill="#0d2257">PLEASANT</text>
  <text x="180" y="214" text-anchor="middle" font-family="Arial, sans-serif" font-weight="600" font-size="11" letter-spacing="6" fill="#f6a83c">LAKE STORAGE</text>
</svg>
